name: Build Beatly

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Generate Secrets.swift from template
        run: |
          cd Beatly
          cp Secrets.example.swift Secrets.swift
          sed -i '' 's/SecretsTemplate/Secrets/g' Secrets.swift

      - name: Build
        run: |
          xcodebuild build \
            -project Beatly.xcodeproj \
            -scheme Beatly \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Build result
        if: always()
        run: echo "Build completed with exit code $?"
